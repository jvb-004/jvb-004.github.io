<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fedora Terminal</title>

<style>

body{
background:#0b0f1a;
color:#58a6ff;
font-family:monospace;
padding:40px;
}

#terminal{
white-space:pre-line;
font-size:18px;
max-width:900px;
}

.cursor{
display:inline-block;
width:10px;
background:#58a6ff;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

</style>
</head>

<body>

<div id="terminal"></div><span class="cursor"></span>

<script>

const lines = [

"Hi explorer, I'm jvb. I'm gonna tell you things about Fedora Linux.",
"",
"Scanning visitor...",
"Access granted.",
"",
"Initializing system kernel...",
"Loading modules...",
"Accessing Fedora repositories...",
"",
"==============================",
" Fedora Linux System Interface",
"==============================",
"",
"$ what-is-fedora",
"Fedora Linux is a free and open-source operating system.",
"It is developed by the Fedora Project.",
"It is sponsored by Red Hat and used by developers worldwide.",
"",
"$ why-choose-fedora",
"- Completely open source",
"- Strong security with SELinux",
"- Very modern Linux technologies",
"- Large developer community",
"- Sponsored by Red Hat",
"",
"$ who-uses-fedora",
"- Software developers",
"- Cybersecurity researchers",
"- Linux enthusiasts",
"- Open-source contributors",
"",
"$ desktop-environment",
"Fedora Workstation uses the GNOME desktop environment.",
"It is modern, clean and optimized for productivity.",
"",
"$ package-manager",
"Fedora uses RPM packages and the DNF package manager.",
"",
"$ example-install",
"sudo dnf install firefox",
"",
"$ fedora-motto",
"'Freedom. Friends. Features. First.'",
"",
"$ status",
"System ready."

]

let lineIndex = 0
let charIndex = 0
let terminal = document.getElementById("terminal")

function typeLine(){

if(lineIndex < lines.length){

if(charIndex < lines[lineIndex].length){

terminal.innerHTML += lines[lineIndex][charIndex]
charIndex++

setTimeout(typeLine,20)

}

else{

terminal.innerHTML += "\n"
lineIndex++
charIndex = 0

setTimeout(typeLine,250)

}

}

}

typeLine()

</script>

</body>

</html>
